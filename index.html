<!DOCTYPE html>
<html lang="vi">
<head>

    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --correct-color: #10b981;
            --incorrect-color: #ef4444;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 10px;
        }

        header p {
            color: #64748b;
            font-size: 16px;
        }

        .quiz-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .question-card {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .question-card.correct-card {
            border-left: 5px solid var(--correct-color);
            background-color: #f0fdf4;
        }

        .question-card.incorrect-card {
            border-left: 5px solid var(--incorrect-color);
            background-color: #fef2f2;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .option-label:hover {
            background-color: #f1f5f9;
        }

        .option-label input {
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: var(--primary-color);
        }

        /* Thể hiện màu đáp án sau khi nộp bài */
        .option-label.correct {
            background-color: #d1fae5 !important;
            border-color: var(--correct-color) !important;
            color: #065f46;
            font-weight: bold;
        }

        .option-label.incorrect {
            background-color: #fee2e2 !important;
            border-color: var(--incorrect-color) !important;
            color: #991b1b;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        #result-box {
            display: none;
            background: #e0f2fe;
            border: 1px solid #bae6fd;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 25px;
            font-size: 18px;
            color: #0369a1;
        }

        .explanation {
            margin-top: 10px;
            font-size: 14px;
            color: #475569;
            font-style: italic;
            display: none;
        }

        sub, sup {
            font-size: 75%;
            line-height: 0;
            position: relative;
            vertical-align: baseline;
        }
        sup { top: -0.5em; }
        sub { bottom: -0.25em; }
    </style>
</head>

            options: ["Giá thành sản xuất rẻ.", "Có thể hoạt động ở nhiệt độ rất cao.", "Mật độ năng lượng cao và khả năng sạc lại tốt.", "Tuyệt đối an toàn, không bao giờ chảy dung dịch."],
            correct: 2
        },
        {
            id: 36,
            question: "Vật liệu nào được dùng làm cực dương trong acquy chì (acquy acid)?",
            options: ["Chì (Pb) xốp.", "Hợp kim chì và antimon.", "Chì sunfat (PbSO<sub>4</sub>).", "Chì dioxit (PbO<sub>2</sub>)."],
            correct: 3
        },
        {
            id: 37,
            question: "Một acquy chì đơn lẻ cung cấp một điện áp khoảng bao nhiêu?",
            options: ["1,5 V.", "12 V.", "4 V.", "2 V."],
            correct: 3
        },
        {
            id: 38,
            question: "Vật liệu nào được sử dụng để thay thế LiCoO<sub>2</sub> độc hại trong pin lithium hiện đại?",
            options: ["Hợp chất Niken - Cadmi.", "Hợp chất Liti mangan oxit (LiMn<sub>2</sub>O<sub>4</sub>).", "Kali hidroxit (KOH).", "Chì dioxit (PbO<sub>2</sub>)."],
            correct: 1
        },
        {
            id: 39,
            question: "Trong quá trình sạc điện cho acquy chì, phản ứng nào xảy ra ở cực âm?",
            options: ["PbSO<sub>4</sub> biến thành PbO<sub>2</sub>.", "PbSO<sub>4</sub> biến thành Pb xốp.", "Pb biến thành PbSO<sub>4</sub>.", "H<sub>2</sub>SO<sub>4</sub> bị điện phân thành H<sub>2</sub> và SO<sub>4</sub><sup>2-</sup>."],
            correct: 1
        },
        {
            id: 40,
            question: "Hai loại acquy kiềm phổ biến được đề cập trong tài liệu là gì?",
            options: ["Sắt - Niken và Cadmi - Niken.", "Chì - Kẽm và Chì - Niken.", "Liti - Mangan và Sắt - Kẽm.", "Cadmi - Sắt và Liti - Niken."],
            correct: 0
        }
    ];

    const labels = ["A", "B", "C", "D"];

    function renderQuiz() {
        const container = document.getElementById('questions-container');
        container.innerHTML = quizData.map((q, qIdx) => `
            <div class="question-card" id="q-card-${qIdx}">
                <div class="question-text">Câu ${q.id}: ${q.question}</div>
                <div class="options-container">
                    ${q.options.map((opt, oIdx) => `
                        <label class="option-label" id="label-${qIdx}-${oIdx}">
                            <input type="radio" name="question-${qIdx}" value="${oIdx}" required>
                            <span>${labels[oIdx]}. ${opt}</span>
                        </label>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function submitQuiz(event) {
        event.preventDefault();
        let score = 0;

        quizData.forEach((q, qIdx) => {
            const selected = document.querySelector(`input[name="question-${qIdx}"]:checked`);
            const card = document.getElementById(`q-card-${qIdx}`);
            
            // Reset các class cũ
            card.classList.remove('correct-card', 'incorrect-card');
            for(let i=0; i<4; i++) {
                document.getElementById(`label-${qIdx}-${i}`).classList.remove('correct', 'incorrect');
            }

            const correctIdx = q.correct;
            document.getElementById(`label-${qIdx}-${correctIdx}`).classList.add('correct');

            if (selected) {
                const userAns = parseInt(selected.value);
                if (userAns === correctIdx) {
                    score++;
                    card.classList.add('correct-card');
                } else {
                    document.getElementById(`label-${qIdx}-${userAns}`).classList.add('incorrect');
                    card.classList.add('incorrect-card');
                }
            }
        });

        const resultBox = document.getElementById('result-box');
        resultBox.style.display = 'block';
        resultBox.innerHTML = `<strong>Kết quả của bạn:</strong> ${score}/${quizData.length} câu chính xác (${((score/quizData.length)*100).toFixed(1)}%).`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Khởi chạy sinh câu hỏi tự động
    renderQuiz();
</script>

</body>
