<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Ôn Tập Trắc Nghiệm - Chương 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        header p {
            color: #bfdbfe;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background-color: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .stats-bar {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            font-size: 14px;
        }

        .progress-container {
            flex-grow: 1;
            margin: 0 20px;
            background-color: #334155;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--primary);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .q-meta {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .q-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #1e293b;
            border: 1px solid var(--border);
            padding: 14px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-item:hover:not(.disabled) {
            background-color: #334155;
            border-color: var(--text-muted);
        }

        .option-prefix {
            font-weight: 700;
            margin-right: 12px;
            color: var(--primary);
            background-color: #0f172a;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 13px;
        }

        .option-text {
            flex: 1;
            font-size: 15px;
        }

        /* State Classes */
        .option-item.correct {
            background-color: rgba(16, 185, 129, 0.15) !important;
            border-color: var(--success) !important;
            color: #34d399;
        }
        .option-item.correct .option-prefix {
            background-color: var(--success);
            color: white;
        }

        .option-item.wrong {
            background-color: rgba(239, 68, 68, 0.15) !important;
            border-color: var(--danger) !important;
            color: #f87171;
        }
        .option-item.wrong .option-prefix {
            background-color: var(--danger);
            color: white;
        }

        .option-item.disabled {
            cursor: not-allowed;
        }

        .explanation-box {
            margin-top: 16px;
            padding: 14px;
            background-color: #0f172a;
            border-left: 4px solid var(--primary);
            border-radius: 4px 8px 8px 4px;
            font-size: 14px;
            display: none;
        }

        .explanation-box.show {
            display: block;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .nav-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background-color: var(--primary-hover);
        }

        .nav-btn:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .score-summary {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            display: none;
        }

        .score-summary h2 {
            margin-bottom: 15px;
            color: var(--success);
        }

        .score-num {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .reset-btn {
            background-color: #334155;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: 500;
        }
        .reset-btn:hover {
            background-color: #475569;
        }

        @media(max-width: 600px) {
            body { padding: 10px; }
            .stats-bar { flex-direction: column; gap: 10px; text-align: center; }
            .progress-container { width: 100%; margin: 5px 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ỨNG DỤNG ÔN TẬP CHƯƠNG 4</h1>

    </header>

    <div class="tabs">

        <p id="summary-text">Tuyệt vời! Hãy tiếp tục rèn luyện để nắm vững kiến thức nhé.</p>
        <button class="reset-btn" onclick="resetQuiz()">Làm Lại Từ Đầu</button>
    </div>
</div>

                "Lưu huỳnh (S)",
                "Oxy (O)",
                "Nitơ (N)"
            ],
            answer: 1,
            explanation: "Lưu huỳnh phản ứng mở liên kết đôi của phân tử cao su tạo ra cầu nối disulfide (-S-S-) nối các mạch thẳng độc lập thành mạng không gian 3 chiều."
        },
        {
            category: "polyme",
            sub: "Polyme & Composite",
            q: "Nếu bạn để một cục cao su thô (chưa lưu hóa) ngoài trời nắng nóng 40 độ C, hiện tượng gì có khả năng xảy ra nhất?",
            options: [
                "Cao su trở nên rất cứng và giòn.",
                "Cao su bị chảy mềm và trở nên dính.",
                "Cao su tăng tính đàn hồi và nảy tốt hơn.",
                "Không có hiện tượng gì thay đổi."
            ],
            answer: 1,
            explanation: "Cao su thô chưa lưu hóa có cấu trúc mạch thẳng mạch tự do dính kết yếu. Khi nhiệt độ tăng, các chuỗi dễ dàng trượt tự do lên nhau làm cục cao su bị nhão chảy, bết dính và mất tính đàn hồi."
        },
        {
            category: "polyme",
            sub: "Polyme & Composite",
            q: "Tại sao việc tạo ra các cầu nối sulfide (S-S) trong quá trình lưu hóa lại giúp cao su có tính đàn hồi cao (khôi phục hình dạng sau khi kéo)?",
            options: [
                "Cầu nối S-S làm cho các chuỗi polymer cứng lại hoàn toàn như nhựa.",
                "Cầu nối S-S ngăn các chuỗi polymer trượt lên nhau vĩnh viễn, cho phép cấu trúc gập khúc kéo vật liệu về hình dạng cũ.",
                "Cầu nối S-S phản ứng với không khí tạo ra lực đẩy tĩnh điện.",
                "Cầu nối S-S làm tan chảy các mắt xích cis-1,4 để tái cấu trúc."
            ],
            answer: 1,
            explanation: "Các cầu nối lưu huỳnh đóng vai trò điểm nút khóa cố định vị trí các chuỗi. Khi kéo dãn, các chuỗi duỗi thẳng, khi thả ra, các điểm khóa kéo chuỗi polymer gập khúc co trở lại vị trí ban đầu mà không bị biến dạng dư."
        }
    ];

    let currentQuestions = [...allQuestions];
    let currentIndex = 0;
    let score = 0;
    let userAnswers = new Array(allQuestions.length).fill(null);

    function initQuiz() {
        currentIndex = 0;
        score = 0;
        userAnswers = new Array(currentQuestions.length).fill(null);
        document.getElementById('summary-card').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        updateStats();
        renderQuestion();
    }

    function switchTab(tab) {
        // Cập nhật trạng thái nút tab
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Lọc dữ liệu câu hỏi
        if (tab === 'all') {
            currentQuestions = [...allQuestions];
        } else {
            currentQuestions = allQuestions.filter(q => q.category === tab);
        }
        
        initQuiz();
    }

    function updateStats() {
        document.getElementById('question-index').innerText = `Câu hỏi: ${currentIndex + 1}/${currentQuestions.length}`;
        document.getElementById('score-count').innerText = `Đúng: ${score}`;
        const progressPercent = (currentIndex / currentQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = `${progressPercent}%`;

        // Điều khiển ẩn/hiện nút điều hướng
        document.getElementById('prev-btn').disabled = currentIndex === 0;
        if (currentIndex === currentQuestions.length - 1) {
            document.getElementById('next-btn').innerText = "Xem Kết Quả";
        } else {
            document.getElementById('next-btn').innerText = "Câu Tiếp Theo";
        }
    }

    function renderQuestion() {
        if(currentQuestions.length === 0) return;
        const currentQ = currentQuestions[currentIndex];
        const container = document.getElementById('quiz-container');
        
        const prefixOptions = ['A', 'B', 'C', 'D'];
        let optionsHtml = '';
        
        currentQ.options.forEach((opt, idx) => {
            let stateClass = '';
            if (userAnswers[currentIndex] !== null) {
                if (idx === currentQ.answer) stateClass = 'correct';
                else if (idx === userAnswers[currentIndex]) stateClass = 'wrong';
                stateClass += ' disabled';
            }
            
            optionsHtml += `
                <div class="option-item ${stateClass}" onclick="selectOption(${idx})">
                    <div class="option-prefix">${prefixOptions[idx]}</div>
                    <div class="option-text">${opt}</div>
                </div>
            `;
        });

        let isExplanationShow = userAnswers[currentIndex] !== null ? 'show' : '';

        container.innerHTML = `
            <div class="quiz-card animate-fade">
                <div class="q-meta">
                    <span>Chủ đề: ${currentQ.sub}</span>
                    <span>Câu số ${currentIndex + 1}</span>
                </div>
                <div class="q-text">${currentQ.q}</div>
                <div class="options-list">
                    ${optionsHtml}
                </div>
                <div class="explanation-box ${isExplanationShow}">
                    <strong>Giải thích chi tiết:</strong> ${currentQ.explanation}
                </div>
            </div>
        `;
    }

    function selectOption(selectedIdx) {
        if (userAnswers[currentIndex] !== null) return; // Đã trả lời rồi thì khóa

        userAnswers[currentIndex] = selectedIdx;
        const currentQ = currentQuestions[currentIndex];

        if (selectedIdx === currentQ.answer) {
            score++;
        }

        updateStats();
        renderQuestion();
    }

    function nextQuestion() {
        if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            updateStats();
            renderQuestion();
        } else {
            showSummary();
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            updateStats();
            renderQuestion();
        }
    }

    function showSummary() {
        document.getElementById('quiz-container').style.display = 'none';
        const summaryCard = document.getElementById('summary-card');
        summaryCard.style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${currentQuestions.length}`;
        
        const ratio = score / currentQuestions.length;
        let comment = '';
        if(ratio >= 0.8) comment = "Xuất sắc! Bạn đã nắm cực kỳ vững kiến thức Chương 4 rồi đấy. Chúc bạn đạt điểm tối đa!";
        else if(ratio >= 0.5) comment = "Khá tốt! Bạn hãy xem lại các câu trả lời sai trong phần giải thích để củng cố thêm nhé.";
        else comment = "Bạn cần đọc lại kỹ tài liệu và ôn tập lại từ đầu để hệ thống lại kiến thức cốt lõi nhé.";
        
        document.getElementById('summary-text').innerText = comment;
        document.getElementById('progress-bar').style.width = '100%';
    }

    function resetQuiz() {
        initQuiz();
    }

    // Chạy khởi tạo ứng dụng khi tải trang xong
    window.onload = function() {
        initQuiz();
    };
</script>
