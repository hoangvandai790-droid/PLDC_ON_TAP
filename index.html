<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Chương 4 - Khoa Học Vật Liệu</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --success: #16a34a;
            --error: #dc2626;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 { margin: 0; font-size: 1.8rem; }
        p.subtitle { margin: 10px 0 0; opacity: 0.9; font-size: 1rem; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background-color: #e2e8f0;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #475569;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
        }

        .quiz-section {
            display: none;
        }

        .quiz-section.active {
            display: block;
        }

        .question-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.05);
        }

        .question-title {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 15px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .option-item:hover {
            background-color: #f1f5f9;
        }

        .option-item input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Classes for result rendering */
        .option-item.correct-ans {
            background-color: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #14532d;
            font-weight: 500;
        }

        .option-item.wrong-ans {
            background-color: #fee2e2 !important;
            border-color: var(--error) !important;
            color: #7f1d1d;
        }

        .actions {
            position: sticky;
            bottom: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 -4px 10px rgb(0 0 0 / 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .btn-submit { background-color: var(--primary); color: white; }
        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-reset { background-color: #64748b; color: white; }
        .btn-reset:hover { background-color: #475569; }

        #result-box {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CÂU HỎI ÔN TẬP CHƯƠNG 4</h1>
        <p class="subtitle">Kim Loại - Phi Kim - Vật Liệu Polyme</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('metal')">I. Kim Loại</button>
        <button class="tab-btn" onclick="switchTab('nonmetal')">II. Phi Kim</button>
        <button class="tab-btn" onclick="switchTab('poly')">III. Polyme</button>
    </div>

    <form id="quiz-form">
        <div id="metal" class="quiz-section active"></div>

        <div id="nonmetal" class="quiz-section"></div>

        <div id="poly" class="quiz-section"></div>

        <div class="actions">
            <button type="button" class="btn btn-reset" onclick="resetQuiz()">Làm lại</button>
            <div id="result-box"></div>
            <button type="button" class="btn btn-submit" onclick="checkAnswers()">Nộp Bài</button>
        </div>
    </form>
</div>

<script>
    const quizData = {
        metal: [
            { q: "Tính chất vật lý chung nào của kim loại được giải thích chủ yếu bởi sự di chuyển tự do của các electron trong mạng tinh thể?", a: ["Tính dẫn điện và dẫn nhiệt", "Tính dẻo", "Ánh kim", "Nhiệt độ nóng chảy cao"], c: 0 },
            { q: "Trong quá trình sản xuất gang bằng lò cao, đá vôi (CaCO3) được nạp vào lò cùng quặng sắt và than cốc với mục đích chính là gì?", a: ["Cung cấp thêm nhiệt cho lò", "Làm chất khử oxit sắt", "Tạo xỉ để loại bỏ tạp chất", "Hòa tan cacbon vào sắt lỏng"], c: 2 },
            { q: "Theo tài liệu, thép cacbon thấp (dùng làm kết cấu xây dựng, tấm lá dập nguội) có hàm lượng cacbon trong khoảng nào?", a: ["≤ 0,25%", "0,30 ÷ 0,50%", "0,55 ÷ 0,65%", "≥ 0,70%"], c: 0 },
            { q: "Hợp kim đồng thau (Brass) là hợp kim của đồng (Cu) với nguyên tố hợp kim chính nào?", a: ["Kẽm (Zn)", "Thiếc (Sn)", "Nhôm (Al)", "Niken (Ni)"], c: 0 },
            { q: "Sắt (Fe) có tính chất vật lý đặc biệt nào mà hầu hết các kim loại khác không có?", a: ["Tính sắt - từ (bị nam châm hút)", "Có màu trắng bạc và ánh kim", "Khả năng dẫn điện tốt", "Rất cứng và có nhiệt độ nóng chảy rất cao"], c: 0 },
            { q: "Hợp kim nhôm đúc (Cast Alloys) phổ biến nhất, như Silumin, sử dụng nguyên tố hợp kim chính nào để cải thiện đáng kể độ chảy loãng (tính đúc)?", a: ["Đồng (Cu)", "Magie (Mg)", "Silic (Si)", "Kẽm (Zn)"], c: 2 },
            { q: "Hợp kim kẽm đúc (Die Casting) phổ biến, được biết đến với tên gọi Zamak, là hợp kim của Kẽm (Zink) với các nguyên tố chính nào sau đây?", a: ["Nhôm (Al), Magie (Mg) và Đồng", "Titan (Ti) và Đồng (Cu)", "Thiếc (Sn) và Chì (Pb)", "Niken (Ni) và Sắt (Fe)"], c: 0 },
            { q: "Để tạo ra vật liệu bán dẫn Silic kiểu n (negative), người ta pha tạp chất là nguyên tố thuộc nhóm nào (có mấy electron hóa trị)?", a: ["Nhóm IIIA (như Bo, Nhôm) - 3 electron hóa trị", "Nhóm VA (như Photpho, Asen) - 5 electron hóa trị", "Nhóm IVA (như Gecmani) - 4 electron hóa trị", "Nhóm VIIA (như Flo) - 7 electron hóa trị"], c: 1 },
            { q: "Để tạo ra vật liệu bán dẫn Silic kiểu p (positive), người ta pha tạp chất là nguyên tố nào sau đây?", a: ["Photpho (P)", "Asen (As)", "Bo (B)", "Antimon (Sb)"], c: 2 },
            { q: "Hợp kim Đồng-Niken (Cupronickel), ví dụ hợp kim Menchio, nổi bật với đặc tính nào?", a: ["Độ bền cơ học cao nhất trong các hợp kim đồng", "Khả năng dẫn điện tốt nhất", "Rất bền với nước biển và chống bám bẩn sinh học", "Hệ số ma sát thấp và chống mài mòn tốt"], c: 2 },
            { q: "Một kỹ sư cần chế tạo các chi tiết máy chịu tải trọng tĩnh và va đập cao (ví dụ: trục, bánh răng), đồng thời cần có cơ tính tổng hợp tốt. Loại thép cacbon nào là phù hợp nhất?", a: ["Thép cacbon thấp (≤ 0,25% C)", "Thép cacbon trung bình (0,30 ÷ 0,50% C)", "Thép cacbon tương đối cao (0,55 ÷ 0,65% C)", "Thép cacbon cao (≥ 0,70% C)"], c: 1 },
            { q: "Tại sao người ta có thể sử dụng các thùng (xitec) bằng nhôm để vận chuyển axit nitric (HNO3) đặc và nguội?", a: ["Vì nhôm là kim loại rất trơ, không phản ứng với mọi axit", "Vì nhôm tạo ra khí H2 ngăn cản phản ứng tiếp diễn", "Vì nhôm bị thụ động hóa trong axit HNO3 đặc, nguội", "Vì nhôm chỉ phản ứng với dung dịch kiềm, không phản ứng với axit"], c: 2 },
            { q: "Một nhà sản xuất cần làm dây dẫn điện. Họ có hai lựa chọn đồng: Đồng ETP (chứa ~0,04% O2) và Đồng OFHC (sạch oxy). Nếu quá trình sản xuất yêu cầu gia công ở nhiệt độ 500°C trong môi trường có khí Hydro (H2), họ nên chọn loại nào để tránh nứt vỡ vật liệu?", a: ["Đồng ETP, vì oxy giúp tăng độ bền khi nóng", "Đồng OFHC, vì không chứa oxy nên không nhạy cảm với hydro", "Loại nào cũng được, vì hydro không ảnh hưởng đến đồng", "Đồng ETP, vì oxy ngăn hydro khuếch tán vào trong"], c: 1 },
            { q: "Một công ty sản xuất đồ chơi mô hình (xe hơi) cần đúc các chi tiết vỏ xe rất mỏng, có độ phức tạp cao và yêu cầu độ chính xác kích thước tốt. Họ nên ưu tiên sử dụng hợp kim nào?", a: ["Thép cacbon cao", "Hợp kim Kẽm (Zamak)", "Hợp kim Nhôm-Magie (nhóm 5xxx)", "Hợp kim Kẽm-Titan (tấm kiến trúc)"], c: 1 },
            { q: "Cấu kiện bán dẫn cơ bản nào được tạo thành bằng cách ghép một lớp bán dẫn kiểu p và một lớp kiểu n (mặt tiếp giáp p-n), có chức năng chính là chuyển dòng điện xoay chiều thành một chiều?", a: ["Pin mặt trời", "Bộ chỉnh lưu (Điot bán dẫn)", "Tranzito (Transistor)", "Vi mạch tổ hợp (IC)"], c: 1 },
            { q: "Đâu là nhược điểm lớn nhất của thép cacbon so với thép hợp kim, đặc biệt khi chế tạo các chi tiết máy có kích thước (tiết diện) lớn?", a: ["Giá thành rẻ và dễ kiếm", "Tính công nghệ (đúc, cán, hàn) tốt", "Độ thấm tôi thấp", "Có cơ tính tổng hợp nhất định"], c: 2 },
            { q: "Tại sao hợp kim Nhôm-Kẽm thường được dùng cho khung máy bay, trong khi hợp kim Nhôm-Magie lại phổ biến trong đóng tàu?", a: ["Hợp kim Nhôm-Kẽm rẻ hơn hợp kim Nhôm-Magie", "Hợp kim Nhôm-Kẽm là hợp kim bền nhất, còn nhóm 5xxx có khả năng chống ăn mòn nước biển tốt", "Hợp kim Nhôm-Kẽm dễ hàn hơn hợp kim Nhôm-Magie", "Hợp kim Nhôm-Kẽm dẫn điện tốt hơn hợp kim Nhôm-Magie"], c: 1 },
            { q: "So với Đồng thau (Cu-Zn), hợp kim Đồng-Niken (Cu-Ni) có ưu điểm vượt trội nào khiến nó trở thành vật liệu ưu tiên cho các hệ thống đường ống dẫn nước biển trên tàu?", a: ["Có màu vàng sáng giống vàng, mang tính thẩm mỹ cao", "Dễ đúc và gia công hơn", "Khả năng chống ăn mòn nước biển và chống bám bẩn sinh học (hà, rêu)", "Cứng và bền ngang ngửa thép"], c: 2 },
            { q: "Sự khác biệt cơ bản trong cơ chế dẫn điện của chất bán dẫn Silic kiểu n và kiểu p là gì?", a: ["Kiểu n dẫn điện bằng ion dương, kiểu p dẫn điện bằng ion âm", "Kiểu n dẫn điện bằng 'lỗ khuyết dương', kiểu p dẫn điện bằng 'electron tự do'", "Kiểu n dẫn điện bằng 'electron tự do' (dư), kiểu p dẫn điện bằng 'lỗ khuyết dương' (thiếu electron)", "Cả hai đều dẫn điện bằng electron tự do, nhưng kiểu n dẫn điện tốt hơn"], c: 2 },
            { q: "Tại sao Sắt (Fe) có lẫn tạp chất lại dễ bị rỉ sét (ăn mòn) nghiêm trọng trong không khí ẩm, trong khi Nhôm (Al) lại được coi là rất bền và chống ăn mòn tốt trong cùng điều kiện?", a: ["Vì Nhôm là kim loại kém hoạt động hơn Sắt", "Vì lớp rỉ sắt (oxit sắt) xốp và giòn, không bảo vệ được kim loại bên trong, còn lớp oxit nhôm (Al2O3) mỏng, cứng, ổn định và bám chặt, bảo vệ kim loại bên dưới", "Vì Sắt là kim loại nặng, Nhôm là kim loại nhẹ", "Vì Sắt bị ăn mòn bởi CO2 trong không khí, còn Nhôm không phản ứng với CO2"], c: 1 }
        ],
        nonmetal: [
            { q: "Theo tài liệu, phương pháp chính để sản xuất oxygene ở quy mô lớn trong công nghiệp là gì?", a: ["Điện phân nước.", "Chưng cất phân đoạn không khí lỏng.", "Nhiệt phân các hợp chất giàu oxi như KMnO4.", "Lọc và nén trực tiếp không khí từ khí quyển."], c: 1 },
            { q: "Sau khi lọc qua cát, nước dùng trong sinh hoạt được sát trùng bằng các tác nhân nào sau đây?", a: ["Phèn nhôm.", "Dung dịch KMnO4 và axit sulfuric.", "Cl2, O3, hoặc tia tử ngoại.", "Than hoạt tính và vôi sống (CaO)."], c: 2 },
            { q: "Dung dịch Hidro peoxit (H2O2) nồng độ 30% có tên gọi thương mại là gì?", a: ["Nước đá khô.", "Pehidrol.", "Oleum.", "Nước Javen."], c: 1 },
            { q: "Dạng thù hình nào của cacbon được mô tả trong tài liệu là \"cứng nhất trong tất cả các chất\"?", a: ["Than chì.", "Kim cương.", "Than cốc.", "Cacbon vô định hình."], c: 1 },
            { q: "Khí Cacbon mono oxit (CO) gây độc cho con người chủ yếu bằng cơ chế nào?", a: ["Phá hủy tế bào thần kinh trung ương.", "Gây bỏng và tổn thương niêm mạc phổi.", "Kết hợp bền vững với hemoglobin, cản trở vận chuyển oxy.", "Làm tăng đột ngột nồng độ CO2 trong máu."], c: 2 },
            { q: "Cacbon đioxit (CO2) ở trạng thái rắn, màu trắng giống như tuyết được gọi là gì?", a: ["Nước đá khô (hoặc tuyết cacbonic).", "Thạch anh.", "Oleum.", "Pehidrol."], c: 0 },
            { q: "Ứng dụng quan trọng nhất của lưu huỳnh (Sulfur) là gì?", a: ["Sản xuất lốp xe (lưu hóa cao su).", "Làm phụ gia cho dầu nhớt chịu cực áp.", "Chế tạo thuốc súng đen và thuốc pháo.", "Dùng làm dầu cắt gọt trong gia công kim loại."], c: 0 },
            { q: "Hỗn hợp của axit sunfuric tinh khiết hòa tan khí SO3 được gọi là gì?", a: ["Hỗn hợp đồng sôi.", "Axit sunfuric loãng.", "Oleum (axit sunfuric bốc khói).", "Pehidrol."], c: 2 },
            { q: "Dựa vào thông tin trong tài liệu, ứng dụng nào sau đây tạo ra nhiệt độ cao nhất dùng trong việc hàn và cắt kim loại?", a: ["Đèn xì hidro-oxi.", "Đèn xì axetilen-oxi.", "Đốt cháy than cốc trong lò cao.", "Đốt cháy khí CO trong không khí."], c: 1 },
            { q: "H2O2 được dùng để phục hồi các bức tranh cổ bị đen (do chì trắng chuyển thành PbS) dựa trên phản ứng nào?", a: ["H2O2 khử PbS (đen) thành Pb (kim loại).", "H2O2 oxi hóa PbS (đen) thành PbSO4 (trắng).", "H2O2 hòa tan lớp PbS (đen) như một axit.", "H2O2 phân hủy tạo O2, thổi bay lớp PbS (đen)."], c: 1 },
            { q: "Nguyên tắc của phương pháp dùng đồng vị C để xác định tuổi của sinh vật cổ xưa là gì?", a: ["Nồng độ 14C trong khí quyển không đổi và 14C không bị phân hủy.", "Sinh vật ngừng đồng hóa C khi chết và lượng 14C giảm dần do phân hủy phóng xạ.", "Sinh vật chỉ hấp thụ 14C sau khi chúng đã chết.", "14C là đồng vị bền, chỉ có trong các mẫu vật cổ xưa."], c: 1 },
            { q: "Nhờ đặc điểm cấu trúc nào mà than chì (graphite) được dùng làm chất bôi trơn?", a: ["Có cấu trúc mạng lưới nguyên tử 3D rất cứng.", "Có khả năng dẫn điện và dẫn nhiệt tốt.", "Có cấu trúc lớp, liên kết giữa các lớp yếu (lực Van der Waals) nên rất mềm và trơn.", "Có khả năng hấp phụ mạnh các chất khí."], c: 2 },
            { q: "Vai trò chính của thiết bị chuyển hóa có xúc tác (Pt, Pd) lắp trong ống xả ô tô là gì?", a: ["Tăng hiệu suất đốt cháy nhiên liệu trong động cơ.", "Hấp phụ các kim loại nặng như chì để bảo vệ môi trường.", "Chuyển hóa các khí độc (CO, NO) thành các khí không độc hại (CO2, N2).", "Làm nguội khí thải trước khi thải ra không khí."], c: 2 },
            { q: " \"Nước đá khô\" (CO2 rắn) được dùng để bảo quan và vận chuyển đồ mau hỏng vì lý do chính nào?", a: ["Vì CO2 rắn rất nặng, tạo áp suất nén lên thực phẩm.", "Khi bay hơi (thăng hoa), CO2 hấp thụ nhiệt lượng lớn, làm lạnh môi trường xung quanh xuống nhiệt độ rất thấp.", "Vì CO2 không duy trì sự sống, giúp tiêu diệt vi khuẩn.", "Vì CO2 tan tốt trong nước, tạo môi trường axit nhẹ bảo quản."], c: 1 },
            { q: "Thao tác nào sau đây là đúng và an toàn khi pha loãng axit sunfuric đặc?", a: ["Đổ từ từ nước vào axit và khuấy đều.", "Đổ nhanh nước vào axit để hòa tan ngay lập tức.", "Đổ từ từ axit vào nước và khuấy đều.", "Đổ nhanh axit vào nước và đậy nắp ngay."], c: 2 },
            { q: "Trong ứng dụng \"tẩy gỉ kim loại\", axit sunfuric loãng, nóng có vai trò gì?", a: ["Oxi hóa bề mặt kim loại để tạo lớp bảo vệ.", "Hòa tan và loại bỏ lớp gỉ (oxit sắt) bám trên bề mặt thép.", "Tạo ra các cầu nối đisunfua làm bền lớp gỉ.", "Làm khô và hút ẩm bề mặt kim loại trước khi mạ."], c: 1 },
            { q: "Nguyên nhân cơ bản nào giải thích tại sao kim cương (rất cứng) và than chì (rất mềm) có tính chất vật lý trái ngược nhau dù cùng cấu tạo từ nguyên tố cacbon?", a: ["Do kim cương chứa đồng vị 12C, còn than chì chứa đồng vị 13C.", "Do kim cương được khai thác tự nhiên, còn than chì là nhân tạo.", "Do sự khác biệt về kiến trúc tinh thể (cách sắp xếp và liên kết của các nguyên tử cacbon).", "Do kim cương trong suốt không màu, còn than chì màu xám đen."], c: 2 },
            { q: "Điều gì làm cho \"than hoạt tính\" có khả năng hấp phụ rất lớn, được dùng trong mặt nạ phòng độc (trừ CO) và lọc chất bẩn?", a: ["Do than hoạt tính có diện tích bề mặt rất phát triển (rất xốp).", "Do than hoạt tính là dạng tinh thể hoàn hảo của than chì.", "Do than hoạt tính có tính khử mạnh hơn kim cương.", "Do than hoạt tính chỉ được điều chế từ than muội."], c: 0 },
            { q: " \"Hiệu ứng nhà kính\" xảy ra chủ yếu do CO2 trong khí quyển:", a: ["Ngăn cản bức xạ nhiệt từ Mặt trời chiếu xuống Trái Đất.", "Hấp thụ bức xạ nhiệt (tia hồng ngoại) từ Mặt Đất phát ra và bức xạ ngược trở lại.", "Phản ứng hóa học với oxy và hơi nước, sinh ra nhiệt.", "Làm tăng nhiệt độ nóng chảy của băng ở hai cực."], c: 1 },

            { q: "Phân tích vai trò của mạng lưới liên kết Hydro trong cấu trúc của Cellulose đối với tính chất vật lý của nó: Tại sao Cellulose không tan trong nước dù có nhiều nhóm thân nước (-OH)?", a: ["Do khối lượng phân tử của cellulose quá nhỏ.", "Do các liên kết hydro nội và liên phân tử quá mạnh, ngăn cản nước xâm nhập và hydrat hóa chuỗi.", "Do cellulose có lớp vỏ sáp bảo vệ bên ngoài.", "Do cellulose là một polyme ion hóa mạnh."], c: 1 },
            { q: "Dựa trên cấu trúc phân tử của LDPE và HDPE hãy xác định tại sao HDPE thích hợp làm ống dẫn chịu lực trong khi LDPE chỉ thích hợp làm túi nilon?", a: ["HDPE có cấu trúc mạch nhánh dài làm tăng độ dẻo, trong khi LDPE mạch thẳng nên cứng.", "HDPE có cấu trúc mạch thẳng, sắp xếp chặt chẽ (mật độ cao) tạo độ cứng và bền; LDPE có mạch nhánh ngăn cản sự sắp xếp khít nên mềm và xốp hơn.", "HDPE chứa các liên kết ngang hóa học còn LDPE thì không.", "HDPE là nhựa nhiệt rắn còn LDPE là nhựa nhiệt dẻo."], c: 1 },
            { q: "Khi một chi tiết composite chịu tải trọng, sự phân phối lực diễn ra như thế nào giữa nền và cốt?", a: ["Vật liệu nền chịu toàn bộ lực, vật liệu cốt chỉ để trang trí.", "Vật liệu cốt chịu toàn bộ lực, vật liệu nền không có tác dụng chịu lực.", "Vật liệu nền truyền tải ứng suất sang vật liệu cốt, vật liệu cốt chịu tải chính và ngăn cản sự biến dạng.", "Cả hai chịu lực độc lập và không liên quan đến nhau."], c: 2 },

    };

    function renderQuiz() {
        for (const section in quizData) {
            const container = document.getElementById(section);
            container.innerHTML = quizData[section].map((item, qIndex) => `
                <div class="question-card" id="card-${section}-${qIndex}">
                    <div class="question-title">Câu ${qIndex + 1}: ${item.q}</div>
                    <div class="options-list">
                        ${item.a.map((opt, oIndex) => `
                            <label class="option-item" id="label-${section}-${qIndex}-${oIndex}">
                                <input type="radio" name="${section}-${qIndex}" value="${oIndex}">
                                <span>${String.fromCharCode(65 + oIndex)}. ${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.quiz-section').forEach(sec => sec.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    function checkAnswers() {
        let totalQuestions = 0;
        let correctAnswers = 0;

        // Reset class labels trước khi chấm điểm lại
        document.querySelectorAll('.option-item').forEach(el => {
            el.classList.remove('correct-ans', 'wrong-ans');
        });

        for (const section in quizData) {
            quizData[section].forEach((item, qIndex) => {
                totalQuestions++;
                const selected = document.querySelector(`input[name="${section}-${qIndex}"]:checked`);
                
                // Hiển thị đáp án đúng bằng màu xanh
                const correctLabel = document.getElementById(`label-${section}-${qIndex}-${item.c}`);
                if (correctLabel) correctLabel.classList.add('correct-ans');

                if (selected) {
                    const ansIndex = parseInt(selected.value);
                    if (ansIndex === item.c) {
                        correctAnswers++;
                    } else {
                        // Nếu chọn sai thì bôi đỏ đáp án đã chọn
                        const wrongLabel = document.getElementById(`label-${section}-${qIndex}-${ansIndex}`);
                        if (wrongLabel) wrongLabel.classList.add('wrong-ans');
                    }
                }
            });
        }

        const scoreBox = document.getElementById('result-box');
        scoreBox.innerText = `Kết quả: ${correctAnswers}/${totalQuestions} câu đúng!`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function resetQuiz() {
        document.getElementById('quiz-form').reset();
        document.getElementById('result-box').innerText = '';
        document.querySelectorAll('.option-item').forEach(el => {
            el.classList.remove('correct-ans', 'wrong-ans');
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Chạy render ngay khi trang tải xong
    window.onload = renderQuiz;
</script>
