<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Ôn Tập Trắc Nghiệm Hóa Học</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #16a085;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .quiz-card:hover {
            transform: translateY(-2px);
        }

        .question-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .options-list {
            list-style: none;
            padding: 0;
        }

        .option-item {
            margin-bottom: 10px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            background-color: #f0f4f8;
            border-color: var(--primary-color);
        }

        .option-item input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
        }

        /* Classes for results rendering */
        .option-item.correct {
            background-color: #d4edda !important;
            border-color: var(--correct-color) !important;
            color: #155724;
            font-weight: bold;
        }

        .option-item.wrong {
            background-color: #f8d7da !important;
            border-color: var(--wrong-color) !important;
            color: #721c24;
        }

        .btn-submit {
            display: block;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-submit:hover {
            background-color: #365880;
        }

        #result-panel {
            display: none;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 5px solid var(--secondary-color);
        }

        .sub-chem {
            font-size: 0.8em;
            vertical-align: sub;
        }
        .super-chem {
            font-size: 0.8em;
            vertical-align: super;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HỆ THỐNG ÔN TẬP TRẮC NGHIỆM</h1>
        <p>Nội dung: Điện hóa học - Nhiệt động lực học - Sự cháy</p>
    </header>

    <form id="quiz-form">
        <div id="quiz-container"></div>
        <button type="button" class="btn-submit" onclick="checkAnswers()">Nộp Bài & Xem Kết Quả</button>
    </form>

    <div id="result-panel">
        <h2>Kết Quả Của Bạn</h2>
        <p id="score-text" style="font-size: 1.5rem; font-weight: bold; color: var(--secondary-color);"></p>
        <p>Các đáp án đúng đã được tô <span style="color: var(--correct-color); font-weight: bold;">Xanh lá</span>. Các câu chọn sai sẽ có màu <span style="color: var(--wrong-color); font-weight: bold;">Đỏ</span>.</p>
    </div>
</div>

<script>
    // Dữ liệu câu hỏi được trích xuất chính xác từ hình ảnh bài tập của bạn
    const quizData = [
        {
            id: 1,
            question: "Khi nhúng thanh kim loại vào dung dịch muối (dung môi là nước) chứa ion của nó, giữa bề mặt thanh kim loại và dung dịch sẽ xuất hiện:",
            options: {
                A: "Một phản ứng hóa học",
                B: "Một lớp điện kép",
                C: "Một lượng kết tủa",
                D: "Một chất khí bay lên"
            },
            correct: "B"
        },
        {
            id: 2,
            question: "Thế điện cực chuẩn của điện cực hydrogen được quy ước bằng bao nhiêu?",
            options: {
                A: "1 V",
                B: "0 V",
                C: "0,5 V",
                D: "2 V"
            },
            correct: "B"
        },
        {
            id: 3,
            question: "Trong pin điện hóa, chọn câu trả lời đúng:",
            options: {
                A: "Anot là cực âm.",
                B: "Catot là điện cực xảy ra quá trình oxy hóa.",
                C: "Anot là điện cực tại đó xảy ra quá trình khử.",
                D: "Catot là cực âm."
            },
            correct: "A"
        },
        {
            id: 4,
            question: "Trong pin Cu - Zn, quá trình khử xảy ra ở điện cực là:",
            options: {
                A: "Zn - 2e → Zn<span class='super-chem'>2+</span>",
                B: "Cu<span class='super-chem'>2+</span> + 2e → Cu",
                C: "Zn → Zn<span class='super-chem'>2+</span> + 2e",
                D: "Cu → Cu<span class='super-chem'>2+</span> + 2e"
            },
            correct: "B"
        },
        {
            id: 5,
            question: "Khi pin Daniel - Jacobi hoạt động, điện cực kẽm (Zn) sẽ bị:",
            options: {
                A: "Không thay đổi",
                B: "Được phủ thêm lớp kim loại",
                C: "Nhận electron",
                D: "Mòn dần"
            },
            correct: "D"
        },
        {
            id: 6,
            question: "Vai trò chính của cầu muối trong cấu tạo của pin điện hóa là:",
            options: {
                A: "Lưu thông dung dịch",
                B: "Vận chuyển electron trực tiếp",
                C: "Đóng kín mạch điện",
                D: "Xúc tác cho phản ứng trong pin"
            },
            correct: "C"
        },
        {
            id: 7,
            question: "Cho sơ đồ pin: (-) Fe/Fe<span class='super-chem'>2+</span> // Cu<span class='super-chem'>2+</span>/Cu (+). Phương trình phản ứng xảy ra khi pin hoạt động là:",
            options: {
                A: "Fe + Cu → Fe<span class='super-chem'>2+</span> + Cu<span class='super-chem'>2+</span>",
                B: "Fe<span class='super-chem'>2+</span> + Cu → Fe + Cu<span class='super-chem'>2+</span>",
                C: "Fe + Cu<span class='super-chem'>2+</span> → Fe<span class='super-chem'>2+</span> + Cu",
                D: "Fe<span class='super-chem'>2+</span> + Cu<span class='super-chem'>2+</span> → Fe + Cu"
            },
            correct: "C"
        },
        {
            id: 8,
            question: "Quá trình đẳng tích là quá trình nhiệt động diễn ra khi:",
            options: {
                A: "Áp suất không đổi",
                B: "Thể tích không đổi",
                C: "Nhiệt độ không đổi",
                D: "Hệ không trao đổi nhiệt với môi trường"
            },
            correct: "B"
        },
        {
            id: 9,
            question: "Quá trình đẳng áp là quá trình nhiệt động diễn ra khi:",
            options: {
                A: "Áp suất không đổi",
                B: "Thể tích không đổi",
                C: "Nhiệt độ không đổi",
                D: "Hệ không trao đổi nhiệt với môi trường"
            },
            correct: "A"
        },
        {
            id: 10,
            question: "Hàm Enthalpy (H) trong nhiệt động học được định nghĩa bằng biểu thức nào?",
            options: {
                A: "H = U - PV",
                B: "H = U + PV",
                C: "H = Q - A",
                D: "H = ΔU + ΔnRT"
            },
            correct: "B"
        },
        {
            id: 11,
            question: "Phản ứng hóa học tỏa nhiệt là phản ứng có giá trị biến thiên Enthalpy thỏa mãn:",
            options: {
                A: "ΔH > 0",
                B: "ΔH < 0",
                C: "ΔU > 0",
                D: "ΔU = 0"
            },
            correct: "B"
        },
        {
            id: 12,
            question: "Phản ứng hóa học thu nhiệt là phản ứng có đặc điểm:",
            options: {
                A: "ΔH > 0",
                B: "ΔH < 0",
                C: "ΔU < 0",
                D: "ΔH = 0"
            },
            correct: "A"
        },
        {
            id: 13,
            question: "Đâu là sự khác biệt cơ bản giữa 'Pin điện' (sơ cấp) và 'Acquy' (thứ cấp)?",
            options: {
                A: "Pin có sức điện động cao hơn hẳn acquy",
                B: "Pin sử dụng chất điện li dạng rắn, còn acquy sử dụng dạng lỏng",
                C: "Pin là nguồn sơ cấp không thể phục hồi, còn acquy là nguồn thứ cấp có thể nạp lại nhiều lần để tái sử dụng",
                D: "Pin chỉ dùng cho thiết bị nhỏ, acquy chỉ dùng cho ô tô"
            },
            correct: "C"
        },
        {
            id: 14,
            question: "Cơ sở khoa học của sự cháy là gì?",
            options: {
                A: "Sự oxi hóa – khử diễn ra chậm, không tỏa nhiệt",
                B: "Quá trình oxi hóa – khử diễn ra nhanh, tỏa nhiệt mạnh và phát sáng",
                C: "Sự phân hủy các hợp chất hữu cơ phức tạp không cần sự tham gia của oxi",
                D: "Quá trình bay hơi cơ học của nhiên liệu trong không khí"
            },
            correct: "B"
        },
        {
            id: 15,
            question: "Ba yếu tố cơ bản cấu thành nên 'tam giác cháy' bao gồm:",
            options: {
                A: "Nhiên liệu, nhiệt độ mồi, chất oxi hóa (thường là oxi trong không khí)",
                B: "Nhiên liệu, dung môi, nước",
                C: "Điện năng, không khí, ánh sáng mặt trời",
                D: "Áp suất, thể tích, thời gian phản ứng"
            },
            correct: "A"
        }
    ];

    // Hàm hiển thị danh sách câu hỏi lên giao diện web
    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = quizData.map((q, index) => `
            <div class="quiz-card" id="question-${q.id}">
                <div class="question-title">Câu ${index + 1}: ${q.question}</div>
                <ul class="options-list">
                    ${Object.entries(q.options).map(([key, value]) => `
                        <li class="option-item" onclick="selectOption(this)">
                            <input type="radio" name="q-${q.id}" value="${key}" id="q-${q.id}-${key}">
                            <label for="q-${q.id}-${key}"><strong>${key}.</strong> ${value}</label>
                        </li>
                    `).join('')}
                </ul>
            </div>
        `).join('');
    }

    // Tự động chọn radio khi nhấn vào cả vùng thẻ li nhằm tăng trải nghiệm di động
    function selectOption(element) {
        const radio = element.querySelector('input[type="radio"]');
        if (radio) {
            radio.checked = true;
        }
    }

    // Hàm chấm điểm bài làm và hiển thị đáp án trực quan
    function checkAnswers() {
        let correctCount = 0;

        quizData.forEach(q => {
            const selectedRadio = document.querySelector(`input[name="q-${q.id}"]:checked`);
            const card = document.getElementById(`question-${q.id}`);
            const items = card.querySelectorAll('.option-item');

            // Reset định dạng cũ nếu có
            items.forEach(item => item.classList.remove('correct', 'wrong'));

            // Đánh dấu đáp án đúng thực tế của câu hỏi
            items.forEach(item => {
                const radio = item.querySelector('input[type="radio"]');
                if (radio.value === q.correct) {
                    item.classList.add('correct');
                }
            });

            // Nếu người dùng có chọn đáp án
            if (selectedRadio) {
                if (selectedRadio.value === q.correct) {
                    correctCount++;
                } else {
                    // Nếu chọn sai, tô đỏ đáp án mà người dùng đã chọn
                    selectedRadio.closest('.option-item').classList.add('wrong');
                }
            }
        });

        // Hiển thị bảng tổng kết điểm số
        const resultPanel = document.getElementById('result-panel');
        const scoreText = document.getElementById('score-text');
        
        scoreText.innerText = `Bạn làm đúng ${correctCount} / ${quizData.length} câu! (${((correctCount/quizData.length)*10).toFixed(2)} điểm)`;
        resultPanel.style.display = 'block';
        
        // Cuộn trang xuống phần kết quả một cách mượt mà
        resultPanel.scrollIntoView({ behavior: 'smooth' });
    }

    // Chạy hàm render ngay khi trang web tải xong
    window.onload = renderQuiz;
</script>

</body>
</html>
